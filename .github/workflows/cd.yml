# ─────────────────────────────────────────────────────────────────────────────
# CD — Build & Push Docker Image
#
# Triggers:
#   • Push to main / claude/fintech-ledger-system-9kAPd
#   • Manual dispatch (workflow_dispatch) with optional version tag
#
# What it does:
#   1. Runs the full CI pipeline (build + tests) as a gate
#   2. Builds a multi-platform Docker image (linux/amd64 + linux/arm64)
#   3. Pushes to GitHub Container Registry (ghcr.io)
#      Tagged as:
#        ghcr.io/<owner>/ledger-system:latest
#        ghcr.io/<owner>/ledger-system:<short-sha>
#        ghcr.io/<owner>/ledger-system:<semver>   (only on version tags)
#
# Required repository secrets:
#   None — uses GITHUB_TOKEN (automatic) for GHCR push.
#
# Optional secrets (for Docker Hub mirroring):
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# ─────────────────────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches:
      - main
      - claude/fintech-ledger-system-9kAPd
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional semver tag (e.g. 1.2.3)"
        required: false

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ledger-system

jobs:
  # ── Gate: full test suite must pass before publishing ─────────────────────
  test:
    name: Test Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & build
        run: dotnet build --configuration Release

      - name: Unit tests
        run: |
          dotnet test tests/LedgerSystem.UnitTests/LedgerSystem.UnitTests.csproj \
            --configuration Release --no-build

      - name: Integration tests
        env:
          Jwt__Secret: "cd-test-secret-key-minimum-32-characters"
          Jwt__Issuer: "https://localhost"
          Jwt__Audience: "https://localhost"
        run: |
          dotnet test tests/LedgerSystem.IntegrationTests/LedgerSystem.IntegrationTests.csproj \
            --configuration Release --no-build

  # ── Build & push image ────────────────────────────────────────────────────
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event.inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"
