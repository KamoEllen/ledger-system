# ─────────────────────────────────────────────────────────────────────────────
# CI — Build · Unit Tests · Integration Tests
#
# Triggers:
#   • Every push to any branch
#   • Every pull request targeting main / claude/fintech-ledger-system-9kAPd
#
# Jobs:
#   build          → restore + build (Release) — catches compile errors fast
#   unit-tests     → xUnit domain + service tests (no DB required)
#   integration    → WebApplicationFactory tests against a real PostgreSQL
#                    container (confirms full stack wires up correctly)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches:
      - main
      - claude/fintech-ledger-system-9kAPd

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

# ── Build ──────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Run unit tests
        run: |
          dotnet test tests/LedgerSystem.UnitTests/LedgerSystem.UnitTests.csproj \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=unit-results.trx" \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ./TestResults/*.trx

  # ── Integration Tests ─────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       ledger_test
          POSTGRES_USER:     ledger_user
          POSTGRES_PASSWORD: test_password_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledger_user -d ledger_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Run integration tests
        env:
          # LedgerApiFactory uses SQLite in-memory — these vars are for reference only
          # and would be used if a real-DB integration test is added in future.
          ConnectionStrings__Default: >-
            Host=localhost;Port=5432;Database=ledger_test;
            Username=ledger_user;Password=test_password_ci;Pooling=false
          Jwt__Secret: "ci-test-secret-key-minimum-32-characters"
          Jwt__Issuer: "https://localhost"
          Jwt__Audience: "https://localhost"
        run: |
          dotnet test tests/LedgerSystem.IntegrationTests/LedgerSystem.IntegrationTests.csproj \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./TestResults/*.trx
