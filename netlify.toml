[build]
  base    = "frontend/ledger-angular"
  command = "npm run build -- --configuration production"
  publish = "dist/ledger-angular/browser"

[[redirects]]
  from   = "/api/*"
  to     = "https://ledger-system-1h27.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
